services:
  # MySQL 数据库
  mysql:
    image: mysql:9.5.0
    container_name: mysql9-dqy-mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/log:/var/log/mysql
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/mysql-files:/var/lib/mysql-files
    environment:
      MYSQL_ROOT_PASSWORD: root
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: redis-stock
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./redis/data:/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Stock Web 应用
  stock-web:
    build:
      context: ../stock-web
      dockerfile: Dockerfile
    container_name: stock-web
    ports:
      - "6060:6060"
    environment:
      # 数据库配置
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/us_stock_monitor_dev?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      # Redis 配置
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=
      - SPRING_DATA_REDIS_DATABASE=0
      # 其他配置（通过 .env 文件传入）
      - BAIDU_TRANSLATE_HOST=${BAIDU_TRANSLATE_HOST}
      - BAIDU_TRANSLATE_APPID=${BAIDU_TRANSLATE_APPID}
      - BAIDU_TRANSLATE_SECURITYKEY=${BAIDU_TRANSLATE_SECURITYKEY}
      - DINGDING_TOKEN=${DINGDING_TOKEN}
      - DINGDING_SECRET=${DINGDING_SECRET}
      - DINGDING_USERID=${DINGDING_USERID}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # Stock MCP 服务
  stock-mcp:
    build:
      context: ../stock-mcp
      dockerfile: Dockerfile
    container_name: stock-mcp
    ports:
      - "7070:7070"
    environment:
      # 数据库配置
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/us_stock_monitor_dev?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
